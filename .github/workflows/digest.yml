name: Healthcare AI Radar digest

# Runs in the cloud every 4 hours (independent of your laptop) and emails the
# stories that are new since the previous run. The "seen" state is committed
# back so each run only surfaces genuinely new items.
on:
  schedule:
    - cron: "0 */4 * * *"   # every 4 hours, UTC
  workflow_dispatch: {}       # manual "Run workflow" button in the Actions tab

permissions:
  contents: write             # needed to commit the updated state file

concurrency:
  group: radar-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch, rank and email new stories
        env:
          EMAIL_HOST: smtp.gmail.com
          EMAIL_PORT: "587"
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          ENTREZ_EMAIL: ${{ secrets.EMAIL_USERNAME }}
        # --no-llm keeps CI key-free (verbatim summaries); drop it and add a
        # GOOGLE_API_KEY secret if you want LLM-polished summaries in the email.
        run: python main.py run --no-llm --new-only --email

      - name: Commit updated "seen" state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/seen.json
          if git diff --cached --quiet; then
            echo "No new state to commit."
          else
            git commit -m "chore: update digest seen-state [skip ci]"
            git push
          fi
