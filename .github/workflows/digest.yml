name: Healthcare AI Radar digest

# Runs in the cloud every 4 hours (independent of your laptop) and emails the
# stories that are new since the previous run. The "seen" state persists between
# runs via the Actions cache - NOT committed back to the repo - so the git
# history stays clean and there is no push race between runs.
on:
  # Scheduled email delivery is PAUSED (opted out for now). To resume the
  # automatic every-4-hours emails, uncomment the two schedule lines below.
  # schedule:
  #   - cron: "0 */4 * * *"   # every 4 hours, UTC
  workflow_dispatch: {}       # manual "Run workflow" button in the Actions tab

concurrency:
  group: radar-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore the previous run's seen-state. The per-run key never matches on
      # its own, so restore-keys falls back to the most recent "radar-seen-*"
      # cache. First run finds nothing -> everything counts as new (correct).
      - name: Restore "seen" state from previous run
        uses: actions/cache/restore@v4
        with:
          path: state/seen.json
          key: radar-seen-${{ github.run_id }}
          restore-keys: |
            radar-seen-

      - name: Check email secrets are present (values never printed)
        env:
          U: ${{ secrets.EMAIL_USERNAME }}
          P: ${{ secrets.EMAIL_PASSWORD }}
          T: ${{ secrets.EMAIL_TO }}
        run: |
          [ -n "$U" ] && echo "EMAIL_USERNAME: present" || echo "EMAIL_USERNAME: MISSING"
          [ -n "$P" ] && echo "EMAIL_PASSWORD: present (${#P} chars, expected 16)" || echo "EMAIL_PASSWORD: MISSING"
          [ -n "$T" ] && echo "EMAIL_TO: present" || echo "EMAIL_TO: MISSING"

      - name: Fetch, rank and email new stories
        env:
          EMAIL_HOST: smtp.gmail.com
          EMAIL_PORT: "587"
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          ENTREZ_EMAIL: ${{ secrets.EMAIL_USERNAME }}
        # --no-llm keeps CI key-free (verbatim summaries); drop it and add a
        # GOOGLE_API_KEY secret if you want LLM-polished summaries in the email.
        run: python main.py run --no-llm --new-only --email

      # Persist the updated seen-state under this run's unique key so the next
      # run restores it. Guarded so a run that wrote no state can't fail here.
      - name: Save "seen" state for the next run
        if: ${{ always() && hashFiles('state/seen.json') != '' }}
        uses: actions/cache/save@v4
        with:
          path: state/seen.json
          key: radar-seen-${{ github.run_id }}
